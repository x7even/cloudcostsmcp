name: Bug report
description: A tool returned wrong data or an error
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Include as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `pip show opencloudcosts | grep Version`
      placeholder: "0.8.1"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - AWS
        - GCP
        - Azure
        - Multiple
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool name
      placeholder: "get_price"
    validations:
      required: true

  - type: textarea
    id: spec
    attributes:
      label: Spec / input
      description: The spec dict or parameters you passed to the tool
      render: json
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
      render: json
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: What should the tool have returned? Link to the source pricing page if possible.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, how you're running the server (stdio/http/Docker)
