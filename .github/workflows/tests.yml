name: Tests

# Go test gate for opencloudcosts-go (the active MCP server). This lives at the
# repo root because GitHub Actions only discovers workflows in the top-level
# .github/workflows/ — the copy under opencloudcosts-go/.github/workflows/ci.yml
# is in-tree documentation for the subproject and is never executed by Actions.
# The Python test suite was retired with the Go cutover; the Python tree itself
# is removed in a later pass.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go:
    name: Go build / test / vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencloudcosts-go
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: opencloudcosts-go/go.mod

      - run: go build ./...
      - run: go test -race ./...
      - run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: opencloudcosts-go
          args: --enable=errcheck,staticcheck,gosec,gocritic
