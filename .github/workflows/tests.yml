name: Tests

# Go test gate for opencloudcosts-go (the active MCP server). This lives at the
# repo root because GitHub Actions only discovers workflows in the top-level
# .github/workflows/ — the copy under opencloudcosts-go/.github/workflows/ci.yml
# is in-tree documentation for the subproject and is never executed by Actions.
# The Python test suite was retired with the Go cutover; the Python tree itself
# is removed in a later pass.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go:
    name: Go build / test / vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencloudcosts-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: opencloudcosts-go/go.mod

      # Validate the static (no-cgo) binary build the Dockerfile actually ships.
      - run: CGO_ENABLED=0 go build ./...
      # The race detector requires cgo, so run tests with cgo enabled (default).
      - run: go test -race ./...
      - run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # Advisory only: the v6 action installs golangci-lint v1.64.8 (built with
      # go1.24), which refuses to run against this module's go1.25 target. The
      # real fix is migrating to golangci-lint v2 (action @v8 + v2 --enable
      # syntax); until then a lint toolchain-skew must not block deploys. The
      # hard gate above (build / test -race / vet / govulncheck) is what matters.
      - name: golangci-lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: opencloudcosts-go
          args: --enable=errcheck,staticcheck,gosec,gocritic
