name: Publish Docker image

# Builds and ships the Go MCP server (opencloudcosts-go/). The Go binary is a
# drop-in replacement for the Python server at the transport layer, so it keeps
# the same GHCR package name (${{ github.repository }} = cloudcostsmcp) and the
# same :sha-<short>/latest/semver tags — the home-cluster deploy job and the
# Deployment manifest need no change. The Python image is no longer built here.
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the version can be derived from git

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive package version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="0.0.0+${GITHUB_SHA::7}"   # version+sha for main builds (passed to Go -ldflags)
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VER}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest -> default branch; sha-<short> -> every commit; semver -> tags
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # The Go Dockerfile does `COPY . .` then builds ./cmd/opencloudcosts,
          # so the build context must be the module dir (go.mod lives there).
          context: opencloudcosts-go
          file: opencloudcosts-go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Rolls the home cluster onto the freshly-built image the instant the build
  # finishes. Runs on a self-hosted runner inside the cluster (no inbound
  # internet exposure) and pins the Deployment to the exact :sha-<short> tag
  # using the runner pod's in-cluster ServiceAccount. If the self-hosted runner
  # is offline this job simply waits/skips; the build above is unaffected.
  deploy-home-cluster:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, occ-cluster]
    steps:
      - name: Pin deployment to the new image
        run: |
          SHA="sha-${GITHUB_SHA::7}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY}:${SHA}"
          echo "Rolling opencloudcosts onto ${IMAGE}"
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -sSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x /tmp/kubectl
            export PATH="/tmp:${PATH}"
          fi
          # In-cluster auth via the runner pod's ServiceAccount token.
          kubectl -n opencloudcosts set image deployment/opencloudcosts \
            opencloudcosts="${IMAGE}"
          kubectl -n opencloudcosts rollout status deployment/opencloudcosts --timeout=120s
