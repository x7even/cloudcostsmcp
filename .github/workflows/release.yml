name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build PyPI wheels for (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: opencloudcosts-go/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # On tag push: publish to GitHub releases.
          # On workflow_dispatch: skip publish (assets already exist), just
          # build binaries and write dist/artifacts.json for the PyPI step.
          args: >-
            release --clean
            ${{ github.event_name == 'workflow_dispatch' && '--skip=publish' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For dispatch runs, tell goreleaser which tag to build from.
          GORELEASER_CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        continue-on-error: ${{ github.event_name != 'workflow_dispatch' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PyPI wheels
        run: python packaging/pypi/build_wheels.py

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: dist/wheels/

  publish-pypi:
    needs: goreleaser
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
