name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: opencloudcosts-go/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Asset uploads fail on re-runs (already_exists). continue-on-error
        # so the wheel build and PyPI publish still run — GoReleaser always
        # writes dist/artifacts.json locally even when the upload step fails.
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PyPI wheels
        run: python packaging/pypi/build_wheels.py

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: dist/wheels/

  publish-pypi:
    needs: goreleaser
    # Run even if goreleaser had a non-fatal failure (e.g. re-run asset conflict)
    if: ${{ needs.goreleaser.result == 'success' || needs.goreleaser.result == 'failure' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
