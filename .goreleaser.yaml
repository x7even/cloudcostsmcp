version: 2

builds:
  - id: opencloudcosts
    binary: opencloudcosts
    main: ./cmd/opencloudcosts
    dir: opencloudcosts-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "opencloudcosts_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: x7even
    name: cloudcostsmcp
  name_template: "v{{.Version}}"
